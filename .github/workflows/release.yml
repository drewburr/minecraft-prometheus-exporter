# Version-driven releases.
#
# The version in each module's gradle.properties is the source of truth. On a
# push to master, each buildable platform is checked: if no release exists yet
# for that platform's current version, its jar is built and published (the
# release also creates the git tag, e.g. paper/v1.3.0). Bumping a version and
# merging is all it takes to ship — no manual tagging.
#
# Add fabric/forge to the matrix once their modules are re-enabled in
# settings.gradle.
name: release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: paper
            module: ':paper'
            version_file: paper/gradle.properties
            version_prop: paper_version
            libdir: paper/build/libs
          - platform: neoforge
            module: ':mod:neoforge'
            version_file: mod/neoforge/gradle.properties
            version_prop: neoforge_version
            libdir: mod/neoforge/build/libs
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and tag
        id: meta
        run: |
          version=$(grep -E "^${{ matrix.version_prop }}=" "${{ matrix.version_file }}" | cut -d= -f2)
          tag="${{ matrix.platform }}/v${version}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check for existing release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view '${{ steps.meta.outputs.tag }}' >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.meta.outputs.tag }} already exists; skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 25
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Build ${{ matrix.platform }}
        if: steps.check.outputs.exists == 'false'
        run: ./gradlew ${{ matrix.module }}:build --no-daemon

      - name: Publish release ${{ steps.meta.outputs.tag }}
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          jar=$(ls ${{ matrix.libdir }}/*.jar | grep -vE 'sources|dev-shadow' | head -1)
          gh release create '${{ steps.meta.outputs.tag }}' "$jar" \
            --target '${{ github.sha }}' \
            --title '${{ matrix.platform }} ${{ steps.meta.outputs.version }}' \
            --generate-notes
