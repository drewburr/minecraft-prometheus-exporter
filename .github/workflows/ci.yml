# Build verification for all four platform modules (Paper, NeoForge, Fabric,
# Forge) plus the platform-agnostic core's unit tests.
name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Test core
        run: ./gradlew :core:test --no-daemon

      - name: Build Paper
        run: ./gradlew :paper:build --no-daemon

      - name: Build NeoForge
        run: ./gradlew :mod:neoforge:build --no-daemon

      - name: Build Fabric
        run: ./gradlew :mod:fabric:build --no-daemon

      - name: Build Forge
        run: ./gradlew :mod:forge:build --no-daemon
